<!DOCTYPE html>

<style>

* { margin:0; padding:0; box-sizing:border-box; }
#stage {
    position:relative; width:1200px; height:630px; overflow:hidden;

        radial-gradient(ellipse 85% 70% at 74% 4%, rgba(233,196,138,.60) 0%, rgba(233,196,138,0) 62%),
        linear-gradient(163deg, #EFEBE3 0%, #EFE3CF 52%, #E9CFA6 100%);
}
#stage::after {
    content:''; position:absolute; inset:0; pointer-events:none; opacity:.06;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.logo { position:absolute; top:42px; left:64px; height:58px; }
.mera { position:absolute; top:50%; right:44px; transform:translateY(-50%); width:520px; height:520px; }
.content { position:absolute; left:64px; top:50%; transform:translateY(-50%); z-index:2; }
.label {
    font-size:20px; font-weight:500; letter-spacing:.32em; text-transform:uppercase;
    color:#B0703C; margin-bottom:14px;
}
h1 {
    font-family:'Cormorant Garamond', serif; font-weight:500;
    font-size:116px; line-height:.82; color:#1B4332; max-width:12ch;
}
.ne { position:relative; display:inline-block; color:rgba(27,67,50,.30); font-style:italic; font-weight:400; }
.ne::after {
    content:''; position:absolute; left:-8%; right:-8%; top:52%; height:8px; border-radius:8px;
    background:#E02B12; transform:rotate(-9deg);
}
.facts { position:absolute; left:64px; top:466px; z-index:2; font-size:23px; font-weight:300; color:#7A7268; }
.facts b { font-weight:500; color:#1B4332; }
</style>
</head>
<body>
<div id="stage">
    <img class="logo" src="logo/logo_line_bronze.svg" alt="">

            <circle cx="300" cy="300" r="286" stroke="#1B4332" stroke-opacity=".10" stroke-width="1"/>
